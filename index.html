<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio — BSIT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════
       CSS VARIABLES
    ═══════════════════════════════════════ */
    :root {
      --bg: #F4F3EF;
      --bg-dim: #E8E6E0;
      --text: #1A1A1A;
      --text-dim: #6B6B6B;
      --accent: #FF3C00; /* Bold Red-Orange */
      --accent-hover: #D93200;
      --border: #D1D1D1;
      --card-bg: #FFFFFF;
      --shadow: 0 4px 20px rgba(0,0,0,0.06);
      --font-head: 'Syne', sans-serif;
      --font-body: 'Space Grotesk', sans-serif;
      --radius: 12px;
      --container: 1200px;
    }

    /* DARK MODE SUPPORT */
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0C0C0C;
        --bg-dim: #1A1A1A;
        --text: #EDEDED;
        --text-dim: #888888;
        --accent: #FF4D00;
        --border: #333333;
        --card-bg: #141414;
        --shadow: 0 4px 20px rgba(0,0,0,0.3);
      }
    }

    /* ═══════════════════════════════════════
       RESET & BASE
    ═══════════════════════════════════════ */
    *{margin:0;padding:0;box-sizing:border-box;}
    html{scroll-behavior:smooth;}
    body{font-family:var(--font-body);background:var(--bg);color:var(--text);line-height:1.6;overflow-x:hidden;font-size:16px;-webkit-font-smoothing:antialiased;}

    a{text-decoration:none;color:inherit;transition:0.2s;}
    ul{list-style:none;}
    img{max-width:100%;display:block;}

    .container{max-width:var(--container);margin:0 auto;padding:0 1.5rem;}
    section{padding:5rem 0;}
    
    /* ═══════════════════════════════════════
       TYPOGRAPHY
    ═══════════════════════════════════════ */
    h1,h2,h3,h4{font-family:var(--font-head);font-weight:700;line-height:1.1;}
    
    .label{font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-dim);margin-bottom:0.5rem;display:block;}

    /* ═══════════════════════════════════════
       NAV
    ═══════════════════════════════════════ */
    nav{display:flex;justify-content:space-between;align-items:center;padding:1.5rem 0;position:sticky;top:0;background:var(--bg);z-index:100;}
    .nav-logo{font-family:var(--font-head);font-weight:800;font-size:1.1rem;letter-spacing:-0.02em;}
    .nav-links{display:flex;gap:2rem;}
    .nav-links a{font-size:0.9rem;font-weight:500;color:var(--text-dim);position:relative;}
    .nav-links a:hover{color:var(--text);}
    .nav-links a::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:2px;background:var(--accent);transition:0.3s;}
    .nav-links a:hover::after{width:100%;}

    .hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;}
    .hamburger span{width:24px;height:2px;background:var(--text);transition:0.3s;}

    /* ═══════════════════════════════════════
       HERO SECTION
    ═══════════════════════════════════════ */
    .hero{padding-top:4rem;min-height:90vh;display:flex;align-items:center;}
    .hero-content{max-width:900px;}
    .hero-tag{display:inline-block;background:var(--accent);color:white;font-size:0.75rem;font-weight:600;padding:0.3rem 0.8rem;border-radius:50px;margin-bottom:1.5rem;}
    .hero-title{font-size:clamp(3rem, 8vw, 6.5rem);letter-spacing:-0.03em;margin-bottom:1.5rem;line-height:0.95;}
    .hero-title span{color:var(--accent);display:block;}
    .hero-desc{font-size:1.15rem;color:var(--text-dim);max-width:500px;margin-bottom:2.5rem;}
    .hero-cta{display:flex;gap:1rem;flex-wrap:wrap;}
    
    .btn{font-family:var(--font-head);font-weight:600;font-size:0.95rem;padding:0.9rem 1.8rem;border-radius:var(--radius);cursor:pointer;transition:0.25s;border:none;display:inline-flex;align-items:center;justify-content:center;}
    .btn-primary{background:var(--text);color:var(--bg);}
    .btn-primary:hover{background:var(--accent);transform:translateY(-2px);}
    .btn-outline{border:1.5px solid var(--border);background:transparent;color:var(--text);}
    .btn-outline:hover{border-color:var(--text);background:var(--text);color:var(--bg);}

    .hero-stats{display:flex;gap:3rem;margin-top:4rem;padding-top:2rem;border-top:1px solid var(--border);flex-wrap:wrap;}
    .stat-item strong{display:block;font-family:var(--font-head);font-size:1.8rem;letter-spacing:-0.02em;}
    .stat-item span{font-size:0.85rem;color:var(--text-dim);}

    /* ═══════════════════════════════════════
       BENTO GRID LAYOUT
    ═══════════════════════════════════════ */
    .bento-grid{display:grid;grid-template-columns:repeat(12, 1fr);gap:1.25rem;}
    .bento-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:1.75rem;position:relative;overflow:hidden;transition:0.3s;}
    .bento-card:hover{border-color:var(--accent);box-shadow:var(--shadow);}
    
    /* ═══════════════════════════════════════
       SKILLS SECTION
    ═══════════════════════════════════════ */
    .section-header{margin-bottom:3rem;}
    .section-title{font-size:clamp(2rem, 4vw, 3rem);}

    .skills-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));gap:1.25rem;}
    
    .skill-card{padding:2rem;background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);transition:0.3s;}
    .skill-card:hover{transform:translateY(-5px);box-shadow:var(--shadow);}
    .skill-icon{font-size:1.5rem;margin-bottom:1rem;display:block;}
    .skill-name{font-family:var(--font-head);font-size:1.3rem;margin-bottom:0.5rem;}
    .skill-desc{font-size:0.9rem;color:var(--text-dim);margin-bottom:1rem;}
    .skill-tag{font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;padding:0.3rem 0.6rem;background:var(--bg-dim);border-radius:4px;display:inline-block;}

    /* ═══════════════════════════════════════
       PROJECTS SECTION
    ═══════════════════════════════════════ */
    .project-card{padding:0;display:flex;flex-direction:column;height:100%;}
    .project-header{padding:1.5rem 1.5rem 0.5rem;display:flex;justify-content:space-between;align-items:flex-start;}
    .project-num{font-family:var(--font-head);font-size:0.8rem;font-weight:700;color:var(--text-dim);}
    .project-badge{padding:0.3rem 0.7rem;font-size:0.7rem;font-weight:600;border-radius:50px;background:var(--accent);color:white;}
    .project-body{padding:1rem 1.5rem 1.5rem;flex:1;}
    .project-title{font-size:1.5rem;margin-bottom:0.5rem;}
    .project-desc{font-size:0.9rem;color:var(--text-dim);margin-bottom:1.5rem;}
    .project-tags{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1.5rem;}
    .tag{font-size:0.7rem;padding:0.3rem 0.6rem;border:1px solid var(--border);border-radius:4px;color:var(--text-dim);}
    .project-link{font-weight:600;font-size:0.9rem;display:inline-flex;align-items:center;gap:0.5rem;}
    .project-link:hover{color:var(--accent);gap:0.7rem;}

    /* ═══════════════════════════════════════
       TIMELINE (Education)
    ═══════════════════════════════════════ */
    .timeline{max-width:700px;}
    .timeline-item{display:flex;gap:2rem;padding-bottom:2.5rem;border-left:2px solid var(--border);padding-left:1.5rem;position:relative;margin-left:0.5rem;}
    .timeline-item::before{content:'';position:absolute;left:-5px;top:0;width:8px;height:8px;background:var(--accent);border-radius:50%;}
    .timeline-year{font-family:var(--font-head);font-weight:700;font-size:1.1rem;min-width:120px;}
    .timeline-content h3{font-size:1.2rem;margin-bottom:0.3rem;}
    .timeline-content p{font-size:0.9rem;color:var(--text-dim);}

    /* ═══════════════════════════════════════
       CONTACT
    ═══════════════════════════════════════ */
    .contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:start;}
    .contact-info h2{font-size:clamp(2rem, 5vw, 3.5rem);margin-bottom:1.5rem;}
    .contact-info h2 span{color:var(--accent);}
    .contact-info p{font-size:1.05rem;color:var(--text-dim);margin-bottom:2rem;max-width:400px;}
    
    .contact-list{display:flex;flex-direction:column;gap:1rem;}
    .contact-item{display:flex;align-items:center;gap:1rem;padding:1rem 1.25rem;background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);transition:0.2s;}
    .contact-item:hover{background:var(--text);color:var(--bg);border-color:var(--text);}
    .contact-item-icon{font-size:1.2rem;}
    .contact-item-text strong{display:block;font-weight:600;font-size:0.95rem;}
    .contact-item-text span{font-size:0.85rem;opacity:0.7;}

    .form-group{margin-bottom:1.25rem;}
    .form-group label{display:block;font-size:0.8rem;font-weight:600;margin-bottom:0.5rem;}
    .form-input{width:100%;padding:0.9rem 1rem;font-family:var(--font-body);font-size:0.95rem;background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);outline:none;transition:0.2s;}
    .form-input:focus{border-color:var(--accent);}
    textarea.form-input{min-height:120px;resize:vertical;}

    /* ═══════════════════════════════════════
       FOOTER
    ═══════════════════════════════════════ */
    footer{padding:2rem 0;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;}
    .footer-text{font-size:0.85rem;color:var(--text-dim);}

    /* ═══════════════════════════════════════
       ANIMATIONS
    ═══════════════════════════════════════ */
    @keyframes fadeInUp{
      from{opacity:0;transform:translateY(20px);}
      to{opacity:1;transform:translateY(0);}
    }
    .animate{animation:fadeInUp 0.6s ease forwards;}
    .delay-1{animation-delay:0.1s;opacity:0;}
    .delay-2{animation-delay:0.2s;opacity:0;}
    .delay-3{animation-delay:0.3s;opacity:0;}
    .delay-4{animation-delay:0.4s;opacity:0;}

    /* ═══════════════════════════════════════
       RESPONSIVE
    ═══════════════════════════════════════ */
    @media (max-width: 900px) {
      .contact-grid{grid-template-columns:1fr;gap:3rem;}
      .bento-grid{grid-template-columns:1fr;}
    }

    @media (max-width: 768px) {
      .nav-links{display:none;}
      .hamburger{display:flex;}
      
      .hero-stats{gap:2rem;}
      .hero-cta{flex-direction:column;width:100%;}
      .btn{width:100%;}
      
      .timeline-item{flex-direction:column;gap:0.5rem;padding-left:1.2rem;}
      .timeline-year{font-size:0.9rem;color:var(--accent);margin-bottom:0.25rem;}
    }

    @media (max-width: 480px) {
      section{padding:3.5rem 0;}
      .hero-title{font-size:2.8rem;}
      .hero-stats{flex-direction:column;gap:1.5rem;}
      footer{flex-direction:column;text-align:center;}
    }
  </style>
</head>
<body>

<nav class="container">
  <a href="#" class="nav-logo">DEV.PORTFOLIO</a>
  <ul class="nav-links">
    <li><a href="#skills">Skills</a></li>
    <li><a href="#projects">Projects</a></li>
    <li><a href="#education">Education</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
  <div class="hamburger">
    <span></span>
    <span></span>
    <span></span>
  </div>
</nav>

<section class="hero">
  <div class="container">
    <div class="hero-content">
      <span class="hero-tag animate">Open to Work</span>
      <h1 class="hero-title animate delay-
