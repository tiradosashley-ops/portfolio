<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROTOCOL // PORTFOLIO</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<!-- EmailJS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
:root{
  /* Robot/Cyber Palette */
  --primary:#00F0FF;       /* Cyan Neon */
  --primary-dim:#0097A8;   /* Dim Cyan */
  --primary-glow:rgba(0,240,255,0.4);
  --alert:#FF2A2A;         /* Alert Red */
  
  --bg-dark:#050507;       /* Deep Space */
  --bg-panel:#0E0E12;       /* Gunmetal */
  --border-line:rgba(0,240,255,0.15);
  
  --text-main:#E0E0E5;
  --text-dim:#858590;
  --text-accent:#B0B0B5;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg-dark);color:var(--text-main);font-family:'Syne',sans-serif;font-size:16px;line-height:1.7;overflow-x:hidden;}

/* ── UTILS ── */
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
@keyframes scan{0%{transform:translateY(-100%);}100%{transform:translateY(100%);}}
@keyframes glitch{0%{clip-path:inset(40% 0 61% 0);}20%{clip-path:inset(92% 0 1% 0);}40%{clip-path:inset(43% 0 1% 0);}60%{clip-path:inset(25% 0 58% 0);}80%{clip-path:inset(54% 0 7% 0);}100%{clip-path:inset(58% 0 43% 0);}}

/* ── NAV ── */
nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;justify-content:space-between;align-items:center;padding:1.1rem 5%;background:rgba(5,5,7,0.95);backdrop-filter:blur(10px);border-bottom:1px solid var(--border-line);}
.nav-logo{font-family:'Space Mono',monospace;font-weight:700;font-size:0.8rem;color:var(--primary);letter-spacing:0.12em;text-decoration:none;flex-shrink:0;display:flex;align-items:center;gap:0.5rem;}
.nav-logo::before{content:'[OS]';font-size:0.6rem;opacity:0.7;}
.nav-links{display:flex;gap:2rem;list-style:none;}
.nav-links a{font-family:'Space Mono',monospace;font-size:0.68rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-dim);text-decoration:none;transition:color 0.2s;padding:0.25rem 0;position:relative;}
.nav-links a::after{content:'';position:absolute;bottom:0;left:0;width:0%;height:1px;background:var(--primary);transition:width 0.3s;}
.nav-links a:hover{color:var(--primary);}
.nav-links a:hover::after{width:100%;}

/* Hamburger */
.hamburger{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:4px;z-index:300;}
.hamburger span{display:block;width:24px;height:2px;background:var(--text-main);transition:transform 0.3s,opacity 0.3s;}
.hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
.hamburger.open span:nth-child(2){opacity:0;}
.hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}

/* Mobile nav drawer */
.mobile-nav{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg-dark);z-index:150;flex-direction:column;align-items:center;justify-content:center;gap:2.5rem;border:1px solid var(--border-line);}
.mobile-nav.open{display:flex;}
.mobile-nav a{font-family:'Space Mono',monospace;font-size:1.1rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--text-main);text-decoration:none;transition:color 0.2s;}
.mobile-nav a:hover{color:var(--primary);text-shadow:0 0 8px var(--primary-glow);}

/* ── HERO ── */
#hero{min-height:100vh;display:flex;align-items:center;padding:7rem 5% 4rem;position:relative;}
#hero::after{content:'';position:absolute;top:0;right:0;width:300px;height:100%;background:linear-gradient(90deg,transparent,rgba(0,240,255,0.02));pointer-events:none;z-index:0;}

.hero-left{max-width:700px;width:100%;position:relative;z-index:1;}
.hero-tag{display:inline-flex;align-items:center;gap:0.5rem;font-family:'Space Mono',monospace;font-size:0.68rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--bg-dark);background:var(--primary);padding:0.35rem 1rem;margin-bottom:2rem;clip-path:polygon(0 0, 100% 0, 100% 70%, 95% 100%, 0 100%);animation:fadeUp 0.6s ease both;}
.hero-tag span{color:var(--bg-dark);font-weight:700;}

.hero-name{font-size:clamp(2rem,4.5vw,3.8rem);font-weight:800;line-height:1.0;letter-spacing:-0.03em;margin-bottom:0.5rem;animation:fadeUp 0.6s 0.1s ease both;color:var(--text-main);}
.hero-name span{color:var(--primary);text-shadow:0 0 15px var(--primary-glow);}
.hero-title{font-family:'Space Mono',monospace;font-size:clamp(0.72rem,1.5vw,0.85rem);color:var(--text-accent);letter-spacing:0.06em;margin-bottom:2rem;animation:fadeUp 0.6s 0.2s ease both;border-left:2px solid var(--primary);padding-left:1rem;}
.hero-desc{font-size:clamp(0.88rem,1.5vw,0.96rem);color var(--text-dim);line-height:1.85;margin-bottom:2.5rem;animation:fadeUp 0.6s 0.3s ease both;max-width:90%;}
.hero-desc strong{color:var(--primary);font-weight:700;}
.hero-cta{display:flex;gap:1rem;flex-wrap:wrap;animation:fadeUp 0.6s 0.4s ease both;}

/* Robot Buttons */
.btn-primary{--primary:#00F0FF;background:rgba(0,240,255,0.1);color:var(--primary);font-family:'Space Mono',monospace;font-size:0.75rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:0.9rem 2rem;border:1px solid var(--primary);cursor:pointer;text-decoration:none;transition:all 0.2s;display:inline-block;position:relative;clip-path:polygon(0 0, 100% 0, 100% 80%, 95% 100%, 0 100%);white-space:nowrap;}
.btn-primary:hover{background:var(--primary);color:var(--bg-dark);box-shadow:0 0 20px var(--primary-glow);}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

.btn-outline{background:transparent;color:var(--text-main);font-family:'Space Mono',monospace;font-size:0.75rem;letter-spacing:0.1em;text-transform:uppercase;padding:0.9rem 2rem;border:1px solid var(--text-dim);cursor:pointer;text-decoration:none;transition:all 0.2s;display:inline-block;clip-path:polygon(10px 0, 100% 0, 100% 100%, 0 100%, 0 10px);white-space:nowrap;}
.btn-outline:hover{border-color:var(--primary);color:var(--primary);box-shadow:inset 0 0 8px var(--primary-glow);}

/* Stats */
.hero-stats{display:flex;flex-wrap:wrap;gap:2rem;margin-top:3rem;padding-top:2rem;border-top:1px solid var(--border-line);animation:fadeUp 0.6s 0.5s ease both;}
.stat-num{font-weight:800;font-size:clamp(1.5rem,3vw,2rem);color:var(--primary);line-height:1;font-family:'Space Mono',monospace;}
.stat-label{font-family:'Space Mono',monospace;font-size:0.6rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-dim);margin-top:0.25rem;display:block;}
.stat-num::after{content:'_';animation:blink 1s infinite;font-size:0.5em;vertical-align: super;}

/* ── SECTIONS ── */
section{padding:clamp(3rem,8vw,6rem) 5%;position:relative;z-index:1;}

/* Decorative Grid Background */
section::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(transparent 95%, var(--border-line) 95%),linear-gradient(90deg,transparent 95%, var(--border-line) 95%);background-size:40px 40px;z-index:-1;opacity:0.3;pointer-events
